# ==============================================================================
# AgenticOrg — Dependabot Configuration
# Scans daily for vulnerable dependencies and creates PRs
# ==============================================================================

version: 2
updates:
  # Python (pip) — core platform dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "19:30"    # 1:00 AM IST
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps"
    ignore:
      # Don't auto-update major versions — those need manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

      # fastembed 0.8.x bumps Pillow to >=12.0.0 (py3.14 wheels).
      # composio-core 0.7.21 pins Pillow<11, so the combined resolver
      # fails with ResolutionImpossible inside the API Docker build.
      # Ignore 0.8.x until composio-core widens its Pillow range or
      # fastembed ships a py3.14 wheel that stays compatible with
      # Pillow 10.x.
      #
      # Context: PR #253 (fastembed >=0.8.0) merged CLEAN on PR-level
      # CI but broke main's `build` job + cascaded to #254 and #256.
      # Emergency revert shipped as #263 (cfd841c).
      - dependency-name: "fastembed"
        versions: ["0.8.x"]

  # npm — frontend dependencies
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "daily"
      time: "19:30"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "frontend"
    commit-message:
      prefix: "deps(ui)"

  # GitHub Actions — workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "19:30"
      timezone: "Asia/Kolkata"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"

  # Docker — base image updates
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "19:30"
      timezone: "Asia/Kolkata"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
