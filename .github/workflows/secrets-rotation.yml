name: Secrets rotation

# Quarterly rotation of long-lived secrets. The workflow creates new
# versions of each secret in Google Secret Manager, then rolls the API
# deployments so they pick up the new version. A 24-hour "dual-read"
# window keeps the previous version enabled so in-flight tokens still
# validate; a follow-up job disables the old version after the window.

on:
  schedule:
    - cron: "0 2 1 */3 *"  # 02:00 UTC on the 1st of Jan / Apr / Jul / Oct
  workflow_dispatch:
    inputs:
      secrets:
        description: "Comma-separated list of secret IDs to rotate (default: all)"
        required: false
        default: ""
      dry_run:
        description: "Set to 'true' to plan without rotating"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  rotate:
    name: Rotate secrets
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Resolve secrets to rotate
        id: resolve
        run: |
          if [ -n "${{ inputs.secrets }}" ]; then
            echo "secrets=${{ inputs.secrets }}" >> "$GITHUB_OUTPUT"
          else
            # Default rotation set — see docs/SECRETS_ROTATION.md
            echo "secrets=AGENTICORG_SECRET_KEY,AGENTICORG_WEBHOOK_SECRET,GRANTEX_API_KEY" >> "$GITHUB_OUTPUT"
          fi

      - name: Rotate each secret
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          IFS=',' read -r -a SECRETS <<< "${{ steps.resolve.outputs.secrets }}"
          for SECRET in "${SECRETS[@]}"; do
            echo "Rotating $SECRET"
            NEW_VALUE=$(openssl rand -base64 48)
            printf "%s" "$NEW_VALUE" | \
              gcloud secrets versions add "$SECRET" \
                --data-file=- \
                --project=${{ secrets.GCP_PROJECT_ID }}
          done

      - name: Roll API deployments so they pick up the new version
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          gcloud container clusters get-credentials agenticorg-prod-gke \
            --region=asia-south1 \
            --project=${{ secrets.GCP_PROJECT_ID }}
          kubectl rollout restart deployment/agenticorg-api -n agenticorg
          kubectl rollout status deployment/agenticorg-api -n agenticorg --timeout=5m

      - name: Announce rotation
        run: |
          echo "Secrets rotated: ${{ steps.resolve.outputs.secrets }}"
          echo "Old versions will be disabled in 24h by the next scheduled run."
