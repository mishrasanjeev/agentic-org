name: AgentFlow OS CI/CD
on:
  push: { branches: [main], tags: ["v*"] }
  pull_request: { branches: [main] }

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  HELM_RELEASE: agentflow-os
  HELM_CHART_PATH: ./helm

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff mypy
      - run: ruff check .
      - run: mypy --ignore-missing-imports .

  unit-tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ --cov=. --cov-report=xml
      - uses: codecov/codecov-action@v4

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    services:
      postgres: { image: "pgvector/pgvector:pg16", env: { POSTGRES_DB: test, POSTGRES_USER: test, POSTGRES_PASSWORD: test }, ports: ["5432:5432"] }
      redis: { image: "redis:7-alpine", ports: ["6379:6379"] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: pytest tests/integration/
        env:
          AGENTFLOW_DB_URL: postgresql+asyncpg://test:test@localhost:5432/test
          AGENTFLOW_REDIS_URL: redis://localhost:6379/0
          AGENTFLOW_SECRET_KEY: ci-test-secret-key-minimum-16

  security-scan:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install bandit pip-audit
      - run: bandit -r core/ connectors/ api/ auth/ -ll
      - run: pip-audit

  build:
    needs: [unit-tests, integration-tests, security-scan]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/agentflow-os:${{ github.sha }} \
            -t ${{ env.ECR_REGISTRY }}/agentflow-os:latest \
            .
          docker push ${{ env.ECR_REGISTRY }}/agentflow-os:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/agentflow-os:latest

      - name: Build and push UI image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/agentflow-os-ui:${{ github.sha }} \
            -t ${{ env.ECR_REGISTRY }}/agentflow-os-ui:latest \
            -f Dockerfile.ui .
          docker push ${{ env.ECR_REGISTRY }}/agentflow-os-ui:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/agentflow-os-ui:latest

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for staging
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_STAGING }} \
            --role-arn ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART_PATH }} \
            --namespace agentflow-staging \
            --create-namespace \
            --set image.repository=${{ env.ECR_REGISTRY }}/agentflow-os \
            --set image.tag=${{ github.sha }} \
            --set postgresql.auth.password=${{ secrets.STAGING_DB_PASSWORD }} \
            --set redis.auth.password=${{ secrets.STAGING_REDIS_PASSWORD }} \
            --values ${{ env.HELM_CHART_PATH }}/values-staging.yaml \
            --wait \
            --timeout 600s

      - name: Verify staging deployment health
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-api \
            --namespace agentflow-staging \
            --timeout=300s
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-orchestrator \
            --namespace agentflow-staging \
            --timeout=300s

      - name: Smoke-test staging health endpoint
        run: |
          STAGING_URL="${{ secrets.STAGING_API_URL }}"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/api/v1/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Staging health check failed after 30 attempts"
          exit 1

  e2e-tests:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Install test dependencies
        run: |
          pip install -e ".[dev]"
          npx playwright install --with-deps chromium

      - name: Run API e2e tests against staging
        run: |
          pytest tests/e2e/ \
            --tb=short \
            --junitxml=e2e-results.xml \
            -v
        env:
          AGENTFLOW_E2E_BASE_URL: ${{ secrets.STAGING_API_URL }}
          AGENTFLOW_E2E_TOKEN: ${{ secrets.STAGING_E2E_TOKEN }}

      - name: Run Playwright UI e2e tests
        run: |
          npx playwright test \
            --config=tests/e2e/playwright.config.ts \
            --reporter=junit \
            --output=playwright-results
        env:
          AGENTFLOW_E2E_BASE_URL: ${{ secrets.STAGING_UI_URL }}
          AGENTFLOW_E2E_TOKEN: ${{ secrets.STAGING_E2E_TOKEN }}

      - name: Upload e2e test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            e2e-results.xml
            playwright-results/

  approval-gate:
    needs: e2e-tests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production-approval
    steps:
      - name: Await manual approval
        run: echo "Production deployment approved by reviewer"

  deploy-production:
    needs: approval-gate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for production
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_PRODUCTION }} \
            --role-arn ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}

      - name: Deploy canary (10% traffic)
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART_PATH }} \
            --namespace agentflow-prod \
            --set image.repository=${{ env.ECR_REGISTRY }}/agentflow-os \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=true \
            --set canary.weight=10 \
            --set postgresql.auth.password=${{ secrets.PROD_DB_PASSWORD }} \
            --set redis.auth.password=${{ secrets.PROD_REDIS_PASSWORD }} \
            --values ${{ env.HELM_CHART_PATH }}/values-production.yaml \
            --wait \
            --timeout 600s

      - name: Verify canary health
        run: |
          PROD_URL="${{ secrets.PROD_API_URL }}"
          echo "Waiting 60s for canary traffic to stabilize..."
          sleep 60

          FAIL_COUNT=0
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}/api/v1/health")
            if [ "$STATUS" != "200" ]; then
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
            sleep 5
          done

          if [ "$FAIL_COUNT" -gt 2 ]; then
            echo "Canary health check failed ($FAIL_COUNT/10 failures) — initiating rollback"
            helm rollback ${{ env.HELM_RELEASE }} --namespace agentflow-prod --wait --timeout 300s
            exit 1
          fi
          echo "Canary health check passed ($FAIL_COUNT/10 failures)"

      - name: Promote canary to full production (100% traffic)
        run: |
          helm upgrade ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART_PATH }} \
            --namespace agentflow-prod \
            --set image.repository=${{ env.ECR_REGISTRY }}/agentflow-os \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=false \
            --set postgresql.auth.password=${{ secrets.PROD_DB_PASSWORD }} \
            --set redis.auth.password=${{ secrets.PROD_REDIS_PASSWORD }} \
            --values ${{ env.HELM_CHART_PATH }}/values-production.yaml \
            --wait \
            --timeout 600s

      - name: Verify full production rollout
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-api \
            --namespace agentflow-prod \
            --timeout=300s
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-orchestrator \
            --namespace agentflow-prod \
            --timeout=300s

      - name: Post-deploy production health check
        run: |
          PROD_URL="${{ secrets.PROD_API_URL }}"
          for i in $(seq 1 20); do
            RESP=$(curl -sf "${PROD_URL}/api/v1/health" || true)
            if echo "$RESP" | grep -q '"status":"healthy"'; then
              echo "Production health check passed"
              echo "$RESP"
              exit 0
            fi
            echo "Attempt $i: not yet healthy — retrying in 10s..."
            sleep 10
          done
          echo "Production health check failed after 20 attempts"
          exit 1
