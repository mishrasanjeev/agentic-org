name: AgenticOrg CI/CD
on:
  push: { branches: [main], tags: ["v*"] }
  pull_request: { branches: [main] }

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'asia-south1' }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_REGISTRY: ${{ vars.GCP_REGION || 'asia-south1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/agenticorg
  HELM_RELEASE: agenticorg
  HELM_CHART_PATH: ./helm

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install ruff mypy pydantic
      - run: ruff check .
      - run: mypy --ignore-missing-imports .

  unit-tests:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # PR-D3 staged Postgres + Redis services for unit tests that hit the
    # ORM, but flipping AGENTICORG_DB_URL on exposed response-shape
    # assertions + pytest-asyncio teardown races across existing tests.
    # Follow-up will port those tests cleanly and set the env var. For
    # now the services are defined but not wired into the pytest step,
    # and tests/unit/conftest.py's schema-bootstrap is a no-op.
    services:
      postgres: { image: "pgvector/pgvector:pg16", env: { POSTGRES_DB: test, POSTGRES_USER: test, POSTGRES_PASSWORD: test }, ports: ["5432:5432"] }
      redis: { image: "redis:7-alpine", ports: ["6379:6379"] }
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install uv && uv pip install --system -e ".[dev]"
      - name: Enforce migration for schema changes
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}
          BASE_REF=origin/${{ github.base_ref }} HEAD_REF=HEAD \
            python scripts/check_migration_required.py
      - run: pytest tests/unit/ tests/connector_harness/ tests/security/ --cov=. --cov-report=xml
        env:
          AGENTICORG_SECRET_KEY: ci-test-secret-key-minimum-16
      - uses: codecov/codecov-action@v6

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres: { image: "pgvector/pgvector:pg16", env: { POSTGRES_DB: test, POSTGRES_USER: test, POSTGRES_PASSWORD: test }, ports: ["5432:5432"] }
      redis: { image: "redis:7-alpine", ports: ["6379:6379"] }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install uv && uv pip install --system -e ".[dev]"
      - run: pytest tests/integration/ tests/regression/ -v
        env:
          AGENTICORG_DB_URL: postgresql+asyncpg://test:test@localhost:5432/test
          AGENTICORG_REDIS_URL: redis://localhost:6379/0
          AGENTICORG_SECRET_KEY: ci-test-secret-key-minimum-16

  security-scan:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: |
          python -m venv .audit-env
          . .audit-env/bin/activate
          pip install --upgrade pip
          pip install -e . bandit pip-audit || pip install bandit pip-audit
      - run: |
          . .audit-env/bin/activate
          bandit -r core/ connectors/ api/ auth/ -ll
      - run: |
          . .audit-env/bin/activate
          pip-audit --desc || echo "::warning::pip-audit found vulnerabilities in transitive dependencies"

  build:
    needs: [unit-tests, integration-tests, security-scan]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          docker build \
            -t ${{ env.GAR_REGISTRY }}/agenticorg:${{ github.sha }} \
            -t ${{ env.GAR_REGISTRY }}/agenticorg:latest \
            .
          docker push ${{ env.GAR_REGISTRY }}/agenticorg:${{ github.sha }}
          docker push ${{ env.GAR_REGISTRY }}/agenticorg:latest

      - name: Build and push UI image
        run: |
          docker build \
            --build-arg VITE_GA4_ID=${{ vars.VITE_GA4_ID }} \
            -t ${{ env.GAR_REGISTRY }}/agenticorg-ui:${{ github.sha }} \
            -t ${{ env.GAR_REGISTRY }}/agenticorg-ui:latest \
            -f Dockerfile.ui .
          docker push ${{ env.GAR_REGISTRY }}/agenticorg-ui:${{ github.sha }}
          docker push ${{ env.GAR_REGISTRY }}/agenticorg-ui:latest

  deploy-staging:
    needs: build
    if: false  # Staging namespace removed to cut costs. Re-enable when needed.
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Install GKE auth plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Configure kubectl for GKE staging
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_STAGING }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART_PATH }} \
            --namespace agenticorg-staging \
            --create-namespace \
            --set image.repository=${{ env.GAR_REGISTRY }}/agenticorg \
            --set image.tag=${{ github.sha }} \
            --set imageUI.tag=${{ github.sha }} \
            --set postgresql.auth.password=${{ secrets.STAGING_DB_PASSWORD }} \
            --set redis.auth.password=${{ secrets.STAGING_REDIS_PASSWORD }} \
            --values ${{ env.HELM_CHART_PATH }}/values-staging.yaml \
            --wait \
            --timeout 300s

      - name: Verify staging deployment health
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-api \
            --namespace agenticorg-staging \
            --timeout=300s

      - name: Smoke-test staging health endpoint
        run: |
          STAGING_URL="${{ secrets.STAGING_API_URL }}"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/api/v1/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Staging health check failed after 30 attempts"
          exit 1

  e2e-tests:
    needs: deploy-production
    # deploy-production can still succeed when approval-gate is skipped on main
    # pushes, so gate these jobs on the actual deploy result instead of the
    # default implicit status chain.
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.deploy-production.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      # Ephemeral Postgres used only by tests/e2e/test_cxo_flows.py,
      # which drives the FastAPI app via TestClient and needs a real
      # DB behind it. Cheap to start, isolated from production.
      postgres:
        # Use the credentials the app's default Settings expects so the
        # FastAPI TestClient path works without any env-var plumbing:
        #   core/config.py:20 db_url default =
        #     postgresql+asyncpg://agenticorg:agenticorg_dev@localhost:5432/agenticorg
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agenticorg
          POSTGRES_USER: agenticorg
          POSTGRES_PASSWORD: agenticorg_dev
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U agenticorg -d agenticorg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with: { node-version: "20" }

      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }

      - name: Install Python deps
        run: pip install uv && uv pip install --system -e ".[dev]"

      - name: Wait for production to stabilize after deploy
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "https://app.agenticorg.ai/api/v1/health" || true)
            if [ "$STATUS" = "200" ]; then echo "Production healthy"; break; fi
            echo "Attempt $i: HTTP $STATUS — waiting 10s..."
            sleep 10
          done

      # Acquire the auth token FIRST so every downstream step (pytest e2e,
      # synthetic tests, Playwright) sees the same AGENTICORG_E2E_TOKEN.
      # Previously this step ran after the pytest steps, which forced the
      # 21 token-gated test cases in tests/e2e/test_smoke.py and
      # tests/synthetic_data/ to skip.
      - name: Get fresh E2E auth token
        id: auth
        run: |
          for attempt in 1 2 3 4 5; do
            RESP=$(curl -s -w "\n%{http_code}" -X POST "https://app.agenticorg.ai/api/v1/auth/login" \
              -H "Content-Type: application/json" \
              -d '{"email":"ceo@agenticorg.local","password":"ceo123!"}')
            HTTP_CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            if [ "$HTTP_CODE" = "200" ]; then
              TOKEN=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || true)
              if [ -n "$TOKEN" ]; then
                echo "token=$TOKEN" >> $GITHUB_OUTPUT
                echo "E2E token acquired on attempt $attempt"
                exit 0
              fi
            fi
            echo "Attempt $attempt: HTTP $HTTP_CODE — retrying in 10s..."
            sleep 10
          done
          echo "::error::Could not acquire E2E auth token after 5 attempts — failing pipeline"
          exit 1

      - name: Seed demo tenant with an AP Processor agent (idempotent)
        # Several synthetic tests look up an agent of type ``ap_processor``
        # and skip if none exists. The demo tenant ships with other
        # finance agents but not AP Processor, so the tests were always
        # skipping. Create one here if absent; the endpoint is a no-op
        # when a shadow agent of that type already exists (caught by the
        # fleet-limit guard + 409 -> treated as success).
        run: |
          python3 scripts/seed_e2e_demo_agents.py \
            --base-url https://app.agenticorg.ai \
            --token "${{ steps.auth.outputs.token }}"

      - name: Run Python E2E tests (against production)
        # Global 5-minute cap — the previous fixture-teardown hang wedged
        # a runner past 25 min (CI runs 24432641344 and 24433193853),
        # cancel requests did not propagate. This puts a hard ceiling.
        timeout-minutes: 5
        run: pytest tests/e2e/ -v
        env:
          AGENTICORG_E2E_BASE_URL: https://app.agenticorg.ai
          AGENTICORG_E2E_TOKEN: ${{ steps.auth.outputs.token }}
          # Correct env-var names: `db_url`/`redis_url` fields in Settings
          # map to AGENTICORG_DB_URL/AGENTICORG_REDIS_URL (env_prefix).
          AGENTICORG_DB_URL: postgresql+asyncpg://agenticorg:agenticorg_dev@localhost:5432/agenticorg
          AGENTICORG_REDIS_URL: redis://localhost:6379/0
          AGENTICORG_SECRET_KEY: ci-test-secret-key-minimum-16

      - name: Run Synthetic Agent Quality tests (LLM behavior)
        # Now blocking. With AGENTICORG_ENABLE_LIVE_TESTS=1 + a real token
        # + seeded AP Processor agent, every assertion should resolve.
        # If this step starts flaking on legitimate LLM non-determinism,
        # split the non-deterministic cases into an explicitly-marked
        # suite — do not reintroduce ``continue-on-error``.
        run: pytest tests/synthetic_data/ -v
        env:
          AGENTICORG_E2E_BASE_URL: https://app.agenticorg.ai
          AGENTICORG_E2E_TOKEN: ${{ steps.auth.outputs.token }}
          AGENTICORG_ENABLE_LIVE_TESTS: "1"
          AGENTICORG_SECRET_KEY: ci-test-secret-key-minimum-16

      - name: Install Playwright
        run: cd ui && npm install --legacy-peer-deps && npx playwright install --with-deps chromium

      - name: Run ALL Playwright E2E regression suite against production
        # Blocking. PR #151 (Phase 1 auth role) and #152 (Phase 2 cxo
        # rewrite) fixed the systemic drift that had been hidden by
        # continue-on-error. If a spec fails here, fix the spec or the
        # product — do not reintroduce continue-on-error.
        timeout-minutes: 45
        run: cd ui && npx playwright test --config=e2e/regression.config.ts
        env:
          BASE_URL: https://app.agenticorg.ai
          E2E_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ui/playwright-report/

  approval-gate:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production-approval
    steps:
      - name: Await manual approval
        run: echo "Production deployment approved by reviewer"

  deploy-production:
    needs: [build, integration-tests, security-scan, approval-gate]
    # approval-gate is skipped for non-tag pushes (if: startsWith...),
    # so for main pushes this effectively waits only on the other 3.
    # For tagged releases, it requires the manual approval.
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
      needs.build.result == 'success' &&
      needs.integration-tests.result == 'success' &&
      needs.security-scan.result == 'success' &&
      (needs.approval-gate.result == 'success' || needs.approval-gate.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Install GKE auth plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Configure kubectl for GKE production
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_PRODUCTION }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Run Alembic migrations pre-rollout
        env:
          JOB_NAME: agenticorg-migrate-${{ github.run_id }}
          IMAGE: ${{ env.GAR_REGISTRY }}/agenticorg:${{ github.sha }}
        run: |
          set -euo pipefail
          # Resolve the actual secret name from the running API deployment
          # so the migrate Job uses the same env/secret wiring. Falls back
          # to 'agenticorg-secrets' (helm default) if we cannot introspect.
          SECRET_NAME=$(kubectl get deployment agenticorg-api -n agenticorg \
              -o jsonpath='{.spec.template.spec.containers[0].envFrom[0].secretRef.name}' 2>/dev/null || true)
          SECRET_NAME="${SECRET_NAME:-agenticorg-secrets}"
          echo "Using secret: ${SECRET_NAME}"

          cat <<EOF | kubectl apply -n agenticorg -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB_NAME}
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 600
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: migrate
                    image: ${IMAGE}
                    command: ["python", "scripts/alembic_migrate.py"]
                    envFrom:
                      - secretRef:
                          name: ${SECRET_NAME}
                    env:
                      - name: AGENTICORG_DDL_MANAGED_BY_ALEMBIC
                        value: "true"
          EOF

          # Poll until the job finishes (complete or failed) or we time out.
          for i in $(seq 1 60); do
            SUCCEEDED=$(kubectl get job ${JOB_NAME} -n agenticorg -o jsonpath='{.status.succeeded}' 2>/dev/null || echo "")
            FAILED=$(kubectl get job ${JOB_NAME} -n agenticorg -o jsonpath='{.status.failed}' 2>/dev/null || echo "")
            if [ "$SUCCEEDED" = "1" ]; then
              echo "Migration job succeeded"
              break
            fi
            if [ -n "$FAILED" ] && [ "$FAILED" != "0" ]; then
              echo "Migration job failed (failed=$FAILED)"
              break
            fi
            sleep 5
          done

          echo "::group::Alembic migrate logs"
          kubectl logs --namespace agenticorg job/${JOB_NAME} --tail=100 || true
          echo "::endgroup::"

          FINAL_SUCCEEDED=$(kubectl get job ${JOB_NAME} -n agenticorg -o jsonpath='{.status.succeeded}' 2>/dev/null || echo "")
          kubectl delete job --namespace agenticorg ${JOB_NAME} --wait=false || true
          if [ "$FINAL_SUCCEEDED" != "1" ]; then
            echo "::error::Alembic migration did not complete successfully"
            exit 1
          fi

      - name: Update production images
        run: |
          kubectl set image deploy/agenticorg-api api=${{ env.GAR_REGISTRY }}/agenticorg:${{ github.sha }} \
            --namespace agenticorg
          kubectl set image deploy/agenticorg-ui ui=${{ env.GAR_REGISTRY }}/agenticorg-ui:${{ github.sha }} \
            --namespace agenticorg

      - name: Verify production rollout
        run: |
          set -euo pipefail

          dump_rollout_debug() {
            local deployment_name="$1"
            local app_label="$2"

            echo "::group::${deployment_name} rollout diagnostics"
            kubectl get deployment "${deployment_name}" --namespace agenticorg -o wide || true
            kubectl rollout history deployment/"${deployment_name}" --namespace agenticorg || true
            kubectl get pods --namespace agenticorg -l "app=${app_label}" --no-headers -o custom-columns="NAME:.metadata.name,STATUS:.status.phase,READY:.status.containerStatuses[0].ready,RESTARTS:.status.containerStatuses[0].restartCount" || true
            echo "::endgroup::"
          }

          # Re-check actual deployment readiness after a rollout-status
          # timeout. GKE Autopilot occasionally reports the watch as timed
          # out even when the deployment has reconciled to all-new + ready.
          deployment_is_fully_rolled() {
            local deployment_name="$1"
            local desired updated available
            desired=$(kubectl get deployment "${deployment_name}" -n agenticorg \
              -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
            updated=$(kubectl get deployment "${deployment_name}" -n agenticorg \
              -o jsonpath='{.status.updatedReplicas}' 2>/dev/null || echo "0")
            available=$(kubectl get deployment "${deployment_name}" -n agenticorg \
              -o jsonpath='{.status.availableReplicas}' 2>/dev/null || echo "0")
            [ "$desired" = "$updated" ] && [ "$desired" = "$available" ] && [ "$desired" != "0" ]
          }

          check_rollout() {
            local deployment_name="$1"
            local app_label="$2"

            # 900s matches the deployment's progressDeadlineSeconds in helm.
            if kubectl rollout status deployment/"${deployment_name}" \
              --namespace agenticorg \
              --timeout=900s; then
              echo "${deployment_name} rollout reported success"
              return 0
            fi

            echo "::warning::${deployment_name} rollout status reported timeout — re-checking actual readiness"
            if deployment_is_fully_rolled "${deployment_name}"; then
              echo "${deployment_name} is in fact fully rolled (replicas == updated == available); accepting"
              return 0
            fi

            dump_rollout_debug "${deployment_name}" "${app_label}"
            exit 1
          }

          check_rollout agenticorg-api agenticorg-api
          check_rollout agenticorg-ui agenticorg-ui

      - name: Post-deploy production health check
        run: |
          PROD_URL="${{ secrets.PROD_API_URL }}"
          for i in $(seq 1 20); do
            RESP=$(curl -sf "${PROD_URL}/api/v1/health" || true)
            if echo "$RESP" | grep -qE '"status":"healthy"'; then
              echo "Production health check passed"
              echo "$RESP"
              exit 0
            fi
            echo "Attempt $i: not yet healthy — retrying in 10s..."
            sleep 10
          done
          echo "Production health check failed after 20 attempts"
          exit 1

  submit-indexing:
    needs: deploy-production
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.deploy-production.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with: { node-version: "20" }

      - name: Write service account key
        run: mkdir -p ui/keys && echo "${{ secrets.GSC_INDEXING_KEY }}" | base64 -d > ui/keys/gsc-indexing.json
        shell: bash

      - name: Submit URLs to Google Indexing API + IndexNow
        run: node ui/scripts/submit-indexing.mjs
