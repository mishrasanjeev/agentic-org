# ==============================================================================
# AgenticOrg - Nightly Security Scan
# Fails closed on dependency, SAST, npm, and container high-risk findings.
# ==============================================================================

name: Nightly Security Scan

on:
  schedule:
    # 1:00 AM IST = 19:30 UTC (previous day)
    - cron: "30 19 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  python-audit:
    name: Python Dependency And SAST Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit bandit

      - name: pip-audit project metadata
        run: python -m pip_audit -s pypi --desc on --timeout 60 .

      - name: pip-audit production requirements
        run: python -m pip_audit -s pypi --desc on --timeout 60 -r requirements.txt

      - name: pip-audit v4 optional requirements
        run: python -m pip_audit -s pypi --desc on --timeout 60 -r requirements-v4.txt

      - name: Bandit SAST
        run: python -m bandit -r core api auth connectors workflows -ll

  npm-audit:
    name: Node Dependency Audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [ui, mcp-server, sdk-ts]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: npm audit ${{ matrix.workspace }}
        working-directory: ${{ matrix.workspace }}
        run: |
          npm ci
          npm audit --audit-level=moderate

  docker-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build API image
        run: docker build -t agenticorg-api:scan .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "agenticorg-api:scan"
          format: "table"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1"

  summary:
    name: Security Report
    needs: [python-audit, npm-audit, docker-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Nightly Security Scan Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** $(date -u +%Y-%m-%d)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scanner | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Python dependency/SAST audit | ${{ needs.python-audit.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node dependency audit | ${{ needs.npm-audit.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Container Trivy scan | ${{ needs.docker-scan.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when any security job fails
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
