version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agenticorg
      POSTGRES_USER: agenticorg
      POSTGRES_PASSWORD: agenticorg_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenticorg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: agenticorg
      MINIO_ROOT_PASSWORD: agenticorg_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      AGENTICORG_ENV: development
      AGENTICORG_DB_URL: postgresql+asyncpg://agenticorg:agenticorg_dev@postgres:5432/agenticorg
      AGENTICORG_REDIS_URL: redis://redis:6379/0
      AGENTICORG_STORAGE_BUCKET: agenticorg-docs-dev
      AGENTICORG_STORAGE_ENDPOINT: http://minio:9000
      AGENTICORG_SECRET_KEY: dev-secret-key-change-in-production-32chars
      AGENTICORG_PII_MASKING: "true"
      AGENTICORG_LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      AGENTICORG_ENV: development
      AGENTICORG_DB_URL: postgresql+asyncpg://agenticorg:agenticorg_dev@postgres:5432/agenticorg
      AGENTICORG_REDIS_URL: redis://redis:6379/0
      AGENTICORG_STORAGE_BUCKET: agenticorg-docs-dev
      AGENTICORG_STORAGE_ENDPOINT: http://minio:9000
      AGENTICORG_SECRET_KEY: dev-secret-key-change-in-production-32chars
      AGENTICORG_PII_MASKING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A core.tasks.celery_app worker --loglevel=info --concurrency=4

  # ── Air-gapped: Ollama (CPU) ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    profiles:
      - airgap
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 16G

  # ── Air-gapped: vLLM (GPU) ──────────────────────────────────────
  vllm:
    image: vllm/vllm-openai:latest
    profiles:
      - airgap-gpu
    ports:
      - "8001:8000"
    volumes:
      - vllm_models:/root/.cache/huggingface
    environment:
      VLLM_API_KEY: vllm
    command: >
      --model meta-llama/Llama-3.1-70B-Instruct
      --max-model-len 8192
      --tensor-parallel-size 1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── RAG: RAGFlow ────────────────────────────────────────────────────
  ragflow:
    image: infiniflow/ragflow:latest
    ports:
      - "9380:9380"
    volumes:
      - ragflow_data:/ragflow/data
    profiles:
      - ragflow
    restart: unless-stopped

  # ── Voice: LiveKit ─────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"
      - "7881:7881"
    profiles:
      - voice
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollama_data:
  vllm_models:
  ragflow_data:
