version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agenticorg
      POSTGRES_USER: agenticorg
      POSTGRES_PASSWORD: agenticorg_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenticorg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: agenticorg
      MINIO_ROOT_PASSWORD: agenticorg_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      AGENTICORG_ENV: development
      AGENTICORG_DB_URL: postgresql+asyncpg://agenticorg:agenticorg_dev@postgres:5432/agenticorg
      AGENTICORG_REDIS_URL: redis://redis:6379/0
      AGENTICORG_STORAGE_BUCKET: agenticorg-docs-dev
      AGENTICORG_STORAGE_ENDPOINT: http://minio:9000
      AGENTICORG_SECRET_KEY: dev-secret-key-change-in-production-32chars
      AGENTICORG_PII_MASKING: "true"
      AGENTICORG_LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      AGENTICORG_ENV: development
      AGENTICORG_DB_URL: postgresql+asyncpg://agenticorg:agenticorg_dev@postgres:5432/agenticorg
      AGENTICORG_REDIS_URL: redis://redis:6379/0
      AGENTICORG_STORAGE_BUCKET: agenticorg-docs-dev
      AGENTICORG_STORAGE_ENDPOINT: http://minio:9000
      AGENTICORG_SECRET_KEY: dev-secret-key-change-in-production-32chars
      AGENTICORG_PII_MASKING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A core.worker worker --loglevel=info --concurrency=4

volumes:
  pgdata:
  redisdata:
  miniodata:
