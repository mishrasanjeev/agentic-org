# =============================================================================
# AgenticOrg — Lean Helm Values (~$50-70/month on GKE Autopilot)
# =============================================================================
# Single-replica everything. No HPA. Minimal resource requests.
# Scale up when you have paying customers.
# =============================================================================

# ── Replicas: 1 of each (no HA, no HPA) ──
replicaCount:
  api: 1
  orchestrator: 1
  workers: 1

image:
  repository: asia-south1-docker.pkg.dev/perfect-period-305406/agenticorg/api
  tag: latest
  pullPolicy: IfNotPresent

imageUI:
  repository: asia-south1-docker.pkg.dev/perfect-period-305406/agenticorg/ui
  tag: latest

# ── Lean resource requests (Autopilot bills on requests, not limits) ──
resources:
  api:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  orchestrator:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  workers:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  ui:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Agent scaling: minimal for pre-customer ──
agentScaling:
  _default:
    minReplicas: 1
    maxReplicas: 2
    metrics:
      - type: cpu
        targetAverageUtilization: 80

# ── Fleet limits: reduced for lean deployment ──
fleetLimits:
  maxActiveAgents: 10
  maxAgentsPerDomain: 5
  maxShadowAgents: 3
  maxReplicasGlobalCeiling: 5

# ── Database: Cloud SQL (external — provisioned by gcp-setup-lean.sh) ──
postgresql:
  enabled: false  # Using external Cloud SQL db-f1-micro

# ── Redis: in-cluster (deployed by gcp-setup-lean.sh, skip Memorystore) ──
redis:
  enabled: false  # Using in-cluster Redis pod

# ── Secrets reference ──
secretName: agenticorg-secrets

# ── Service: ClusterIP (use Ingress or port-forward for access) ──
service:
  type: ClusterIP
  port: 8000

# ── Ingress ──
ingress:
  enabled: true
  className: "gce"
  annotations:
    kubernetes.io/ingress.global-static-ip-name: "agenticorg-ingress-ip"
  managedCertificate:
    domains:
      - agenticorg.ai
      - www.agenticorg.ai
      - app.agenticorg.ai
  hosts:
    # Apex domain — landing page
    - host: agenticorg.ai
      paths:
        - path: /
          pathType: Prefix
          backend: ui
          backendPort: 80
    # WWW
    - host: www.agenticorg.ai
      paths:
        - path: /
          pathType: Prefix
          backend: ui
          backendPort: 80
    # App subdomain
    - host: app.agenticorg.ai
      paths:
        - path: /
          pathType: Prefix
          backend: ui
          backendPort: 80

# ── Environment ──
env:
  AGENTICORG_ENV: production
  AGENTICORG_LOG_LEVEL: INFO
  AGENTICORG_PII_MASKING: "true"
  AGENTICORG_DATA_REGION: IN
  AGENTICORG_MAX_CONCURRENT_WORKFLOWS: 50
  AGENTICORG_DEFAULT_CONFIDENCE_FLOOR: "0.88"
  AGENTICORG_LLM_PRIMARY: gemini-2.5-flash
  AGENTICORG_LLM_FALLBACK: gemini-2.5-flash-preview-05-20
