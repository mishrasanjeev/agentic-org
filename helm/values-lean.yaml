# =============================================================================
# AgenticOrg — Lean Helm Values (~$50-70/month on GKE Autopilot)
# =============================================================================
# Single-replica everything. No HPA. Minimal resource requests.
# Scale up when you have paying customers.
# =============================================================================

# ── Replicas: 1 of each (no HA, no HPA) ──
replicaCount:
  api: 1
  orchestrator: 1
  workers: 1

image:
  repository: asia-south1-docker.pkg.dev/YOUR_PROJECT/agenticorg/api
  tag: latest
  pullPolicy: IfNotPresent

imageUI:
  repository: asia-south1-docker.pkg.dev/YOUR_PROJECT/agenticorg/ui
  tag: latest

# ── Lean resource requests (Autopilot bills on requests, not limits) ──
resources:
  api:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  orchestrator:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  workers:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  ui:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Agent scaling: minimal for pre-customer ──
agentScaling:
  _default:
    minReplicas: 1
    maxReplicas: 2
    metrics:
      - type: cpu
        targetAverageUtilization: 80

# ── Fleet limits: reduced for lean deployment ──
fleetLimits:
  maxActiveAgents: 10
  maxAgentsPerDomain: 5
  maxShadowAgents: 3
  maxReplicasGlobalCeiling: 5

# ── Database: Cloud SQL (external — provisioned by gcp-setup-lean.sh) ──
postgresql:
  enabled: false  # Using external Cloud SQL db-f1-micro

# ── Redis: in-cluster (deployed by gcp-setup-lean.sh, skip Memorystore) ──
redis:
  enabled: false  # Using in-cluster Redis pod

# ── Secrets reference ──
secretName: agenticorg-secrets

# ── Service: ClusterIP (use Ingress or port-forward for access) ──
service:
  type: ClusterIP
  port: 8000

# ── Ingress (optional — enable when ready for public access) ──
ingress:
  enabled: false
  # When ready:
  # enabled: true
  # className: "gce"
  # hosts:
  #   - host: api.agenticorg.yourdomain.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  # tls:
  #   - secretName: agenticorg-tls
  #     hosts:
  #       - api.agenticorg.yourdomain.com

# ── Environment ──
env:
  AGENTICORG_ENV: production
  AGENTICORG_LOG_LEVEL: INFO
  AGENTICORG_PII_MASKING: "true"
  AGENTICORG_DATA_REGION: IN
  AGENTICORG_MAX_CONCURRENT_WORKFLOWS: 50
  AGENTICORG_DEFAULT_CONFIDENCE_FLOOR: "0.88"
  AGENTICORG_LLM_PRIMARY: gemini-2.0-flash
  AGENTICORG_LLM_FALLBACK: gemini-2.0-flash-lite
