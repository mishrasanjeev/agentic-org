# =============================================================================
# AgenticOrg — Staging Helm Values
# =============================================================================
# Staging environment: moderate resources, reduced fleet limits.
# Deploy with: helm install agenticorg ./helm -f helm/values-staging.yaml
# =============================================================================

# ── Replicas ──────────────────────────────────────────────────────────────────
replicaCount:
  api: 2
  orchestrator: 1
  workers: 1

image:
  repository: asia-south1-docker.pkg.dev/perfect-period-305406/agenticorg/api
  tag: staging
  pullPolicy: Always

imageUI:
  repository: asia-south1-docker.pkg.dev/perfect-period-305406/agenticorg/ui
  tag: staging

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  api:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  orchestrator:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  workers:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  ui:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Autoscaling (disabled for staging) ────────────────────────────────────────
autoscaling:
  enabled: false

# ── Agent scaling ─────────────────────────────────────────────────────────────
agentScaling:
  _default:
    minReplicas: 1
    maxReplicas: 3
    metrics:
      - type: cpu
        targetAverageUtilization: 75

# ── Fleet limits (reduced for staging) ────────────────────────────────────────
fleetLimits:
  maxActiveAgents: 20
  maxAgentsPerDomain: 5
  maxShadowAgents: 5
  maxReplicasGlobalCeiling: 10

# ── Database ──────────────────────────────────────────────────────────────────
postgresql:
  enabled: false  # Use external Cloud SQL staging instance

redis:
  enabled: false  # Use Memorystore or in-cluster Redis

# ── Secrets ───────────────────────────────────────────────────────────────────
secretName: agenticorg-secrets-staging

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 8000

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "gce"
  annotations:
    kubernetes.io/tls-acme: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: staging.agenticorg.ai
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: agenticorg-staging-tls
      hosts:
        - staging.agenticorg.ai

# ── Environment ───────────────────────────────────────────────────────────────
env:
  AGENTICORG_ENV: staging
  AGENTICORG_LOG_LEVEL: DEBUG
  AGENTICORG_PII_MASKING: "true"
  AGENTICORG_DATA_REGION: IN
  AGENTICORG_MAX_CONCURRENT_WORKFLOWS: 100
  AGENTICORG_DEFAULT_CONFIDENCE_FLOOR: "0.85"
  AGENTICORG_LLM_PRIMARY: gemini-2.5-flash
  AGENTICORG_LLM_FALLBACK: gemini-2.5-flash-preview-05-20
