# =============================================================================
# AgenticOrg — Air-Gapped Deployment Helm Values
# =============================================================================
# For environments with no internet access.
# Uses local LLM (Ollama/vLLM), internal container registry, and local RAGFlow.
#
# Usage:
#   helm install agenticorg ./helm -f helm/values-airgap.yaml
# =============================================================================

replicaCount:
  api: 2
  orchestrator: 2
  workers: 4

# -- Internal container registry (no external pulls) -------------------------
image:
  repository: registry.internal.local/agenticorg/api
  tag: latest
  pullPolicy: IfNotPresent

imageUI:
  repository: registry.internal.local/agenticorg/ui
  tag: latest

# -- Resources ----------------------------------------------------------------
resources:
  api:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  orchestrator:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  workers:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  ui:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Ollama sidecar / service -------------------------------------------------
ollama:
  enabled: true
  image:
    repository: registry.internal.local/ollama/ollama
    tag: latest
  resources:
    requests:
      cpu: 2000m
      memory: 8Gi
    limits:
      cpu: 8000m
      memory: 16Gi
      # nvidia.com/gpu: 1  # Uncomment if GPU available
  models:
    # Tier 1 — simple tasks (data lookups, formatting)
    - gemma3:7b
    # Tier 2 — moderate tasks (analysis, summarization)
    - llama3.1:8b
    # Tier 3 — complex tasks (legal, financial modeling)
    - llama3.1:70b
  storage:
    size: 100Gi
    storageClass: local-storage

# -- vLLM (optional, GPU-accelerated inference) --------------------------------
vllm:
  enabled: false  # Enable when GPU nodes are available
  image:
    repository: registry.internal.local/vllm/vllm-openai
    tag: latest
  model: llama3.1:70b
  resources:
    requests:
      cpu: 4000m
      memory: 32Gi
    limits:
      cpu: 8000m
      memory: 64Gi
      nvidia.com/gpu: 1
  extraArgs:
    - "--max-model-len=8192"
    - "--tensor-parallel-size=1"

# -- Autoscaling (conservative for air-gapped) --------------------------------
autoscaling:
  enabled: true
  maxReplicas: 10
  targetCPUUtilization: 75

# -- In-cluster databases (no external dependencies) ---------------------------
postgresql:
  enabled: true
  image:
    repository: registry.internal.local/pgvector/pgvector
    tag: pg16
  persistence:
    size: 50Gi
    storageClass: local-storage

redis:
  enabled: true
  image:
    repository: registry.internal.local/redis
    tag: 7-alpine
  persistence:
    size: 10Gi

minio:
  enabled: true
  image:
    repository: registry.internal.local/minio/minio
    tag: latest
  persistence:
    size: 100Gi
    storageClass: local-storage

# -- RAGFlow (local document processing) --------------------------------------
ragflow:
  enabled: true
  image:
    repository: registry.internal.local/infiniflow/ragflow
    tag: latest
  embedding_model: local  # Use Ollama for embeddings too

# -- Secret name ---------------------------------------------------------------
secretName: agenticorg-secrets

# -- Service -------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8000

# -- Ingress (internal only) ---------------------------------------------------
ingress:
  enabled: false

# -- Network policy: deny all egress to external networks ----------------------
networkPolicy:
  enabled: true
  denyExternalEgress: true

# -- Environment (air-gapped overrides) ----------------------------------------
env:
  AGENTICORG_ENV: production
  AGENTICORG_LOG_LEVEL: INFO
  AGENTICORG_PII_MASKING: "true"
  AGENTICORG_DATA_REGION: IN

  # LLM: force local mode — no cloud API calls
  AGENTICORG_LLM_MODE: local
  AGENTICORG_LLM_ROUTING: auto

  # Ollama endpoint (in-cluster service)
  OLLAMA_BASE_URL: http://ollama:11434
  OLLAMA_HOST: http://ollama:11434

  # vLLM endpoint (in-cluster service, if enabled)
  VLLM_BASE_URL: http://vllm:8000
  VLLM_API_BASE: http://vllm:8000/v1
  VLLM_API_KEY: vllm

  # Local tier model assignments
  AGENTICORG_LOCAL_TIER1: gemma3:7b
  AGENTICORG_LOCAL_TIER2: llama3.1:8b
  AGENTICORG_LOCAL_TIER3: llama3.1:70b

  # Disable cloud-only features
  AGENTICORG_COMPOSIO_ENABLED: "false"
  AGENTICORG_TELEMETRY_ENABLED: "false"
  AGENTICORG_SEO_INDEXING_ENABLED: "false"

  # Workflow limits
  AGENTICORG_MAX_CONCURRENT_WORKFLOWS: 200
  AGENTICORG_DEFAULT_CONFIDENCE_FLOOR: "0.80"
