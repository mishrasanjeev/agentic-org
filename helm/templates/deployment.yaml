apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
spec:
  replicas: {{ .Values.replicaCount.api }}
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 900
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: agenticorg-api
  template:
    metadata:
      labels:
        app: agenticorg-api
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: {{ .Values.secretName | default "agenticorg-secrets" }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml (.Values.resources.api | default dict) | nindent 12 }}
          # Startup probe: allows up to ~3 minutes for the 3.2 GB image to
          # import LangGraph + 54 connectors and bind port 8000 on cold-
          # started Autopilot nodes. While this probe is passing, the
          # livenessProbe is disabled — kubelet cannot kill the container
          # for slow startup. Once startup succeeds, liveness takes over.
          # Prior config (initialDelaySeconds: 10, failureThreshold: 3)
          # gave only 100s before kubelet SIGKILLed the container, which
          # took production offline during the April 16 deploy storm.
          startupProbe:
            httpGet:
              path: /api/v1/health/liveness
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /api/v1/health/liveness
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-orchestrator
spec:
  replicas: {{ if kindIs "invalid" .Values.replicaCount.orchestrator }}1{{ else }}{{ .Values.replicaCount.orchestrator }}{{ end }}
  selector:
    matchLabels:
      app: agenticorg-orchestrator
  template:
    metadata:
      labels:
        app: agenticorg-orchestrator
    spec:
      containers:
        - name: orchestrator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["python", "-m", "core.orchestrator.nexus"]
          envFrom:
            - secretRef:
                name: {{ .Values.secretName | default "agenticorg-secrets" }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml (.Values.resources.orchestrator | default dict) | nindent 12 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-workers
spec:
  replicas: {{ if kindIs "invalid" .Values.replicaCount.workers }}1{{ else }}{{ .Values.replicaCount.workers }}{{ end }}
  selector:
    matchLabels:
      app: agenticorg-workers
  template:
    metadata:
      labels:
        app: agenticorg-workers
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["celery", "-A", "core.tasks.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
          envFrom:
            - secretRef:
                name: {{ .Values.secretName | default "agenticorg-secrets" }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml (.Values.resources.workers | default dict) | nindent 12 }}
{{- if .Values.imageUI }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agenticorg-ui
  template:
    metadata:
      labels:
        app: agenticorg-ui
    spec:
      containers:
        - name: ui
          image: "{{ .Values.imageUI.repository }}:{{ .Values.imageUI.tag }}"
          ports:
            - containerPort: 80
          resources:
            {{- toYaml (.Values.resources.ui | default dict) | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
{{- end }}
