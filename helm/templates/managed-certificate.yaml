{{- if and .Values.ingress.enabled .Values.ingress.managedCertificate }}
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: {{ .Release.Name }}-managed-cert
spec:
  domains:
    {{- range .Values.ingress.managedCertificate.domains }}
    - {{ . | quote }}
    {{- end }}
{{- end }}
