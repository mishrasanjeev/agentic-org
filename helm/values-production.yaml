# =============================================================================
# AgenticOrg — Production Helm Values
# =============================================================================
# Full production deployment: HA replicas, HPA, full fleet limits, PII masking.
# Deploy with: helm install agenticorg ./helm -f helm/values-production.yaml
# =============================================================================

# ── Replicas ──────────────────────────────────────────────────────────────────
replicaCount:
  api: 3
  orchestrator: 3
  workers: 6

image:
  repository: asia-south1-docker.pkg.dev/perfect-period-305406/agenticorg/api
  tag: latest
  pullPolicy: IfNotPresent

imageUI:
  repository: asia-south1-docker.pkg.dev/perfect-period-305406/agenticorg/ui
  tag: latest

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  api:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  orchestrator:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  workers:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  ui:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Autoscaling (HPA enabled) ────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilization: 70

# ── Agent scaling ─────────────────────────────────────────────────────────────
agentScaling:
  ap_processor:
    minReplicas: 2
    maxReplicas: 20
    metrics:
      - type: queue_depth
        target: 30
  recon_agent:
    minReplicas: 1
    maxReplicas: 5
    metrics:
      - type: schedule
        schedules:
          - cron: "0 22 25-31 * *"
            replicas: 4
  _default:
    minReplicas: 1
    maxReplicas: 5
    metrics:
      - type: cpu
        targetAverageUtilization: 70

# ── Fleet limits (full production) ────────────────────────────────────────────
fleetLimits:
  maxActiveAgents: 50
  maxAgentsPerDomain: 20
  maxShadowAgents: 10
  maxReplicasGlobalCeiling: 20

# ── Database ──────────────────────────────────────────────────────────────────
postgresql:
  enabled: false  # Use external Cloud SQL production instance

redis:
  enabled: false  # Use Memorystore

# ── Secrets ───────────────────────────────────────────────────────────────────
secretName: agenticorg-secrets

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 8000

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "gce"
  annotations:
    kubernetes.io/ingress.global-static-ip-name: "agenticorg-ingress-ip"
  managedCertificate:
    domains:
      - agenticorg.ai
      - www.agenticorg.ai
      - app.agenticorg.ai
  hosts:
    # Apex domain — landing page
    - host: agenticorg.ai
      paths:
        - path: /
          pathType: Prefix
          backend: ui
          backendPort: 80
    # WWW redirect target
    - host: www.agenticorg.ai
      paths:
        - path: /
          pathType: Prefix
          backend: ui
          backendPort: 80
    # App subdomain — full application
    - host: app.agenticorg.ai
      paths:
        - path: /
          pathType: Prefix
          backend: ui
          backendPort: 80

# ── Pod disruption budget ─────────────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# ── Environment ───────────────────────────────────────────────────────────────
env:
  AGENTICORG_ENV: production
  AGENTICORG_LOG_LEVEL: INFO
  AGENTICORG_PII_MASKING: "true"
  AGENTICORG_DATA_REGION: IN
  AGENTICORG_MAX_CONCURRENT_WORKFLOWS: 500
  AGENTICORG_DEFAULT_CONFIDENCE_FLOOR: "0.88"
  AGENTICORG_LLM_PRIMARY: gemini-2.5-flash
  AGENTICORG_LLM_FALLBACK: gemini-2.5-flash-preview-05-20
  GRANTEX_BASE_URL: https://api.grantex.dev

# ── Secrets from GCP Secret Manager ─────────────────────────────────────────
secretEnv:
  GRANTEX_API_KEY:
    secretName: grantex-api-key
    version: latest
