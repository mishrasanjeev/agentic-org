# =============================================================================
# AgenticOrg — Production Helm Values (scale-up when you have customers)
# =============================================================================
# For pre-customer lean deployment, use: helm install -f values-lean.yaml
# =============================================================================

replicaCount:
  api: 3
  orchestrator: 3
  workers: 6

image:
  repository: asia-south1-docker.pkg.dev/perfect-period-305406/agenticorg/api
  tag: latest
  pullPolicy: IfNotPresent

imageUI:
  repository: asia-south1-docker.pkg.dev/perfect-period-305406/agenticorg/ui
  tag: latest

resources:
  api:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  orchestrator:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  workers:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  ui:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

autoscaling:
  enabled: true
  maxReplicas: 20
  targetCPUUtilization: 70

agentScaling:
  ap_processor:
    minReplicas: 2
    maxReplicas: 20
    metrics:
      - type: queue_depth
        target: 30
  recon_agent:
    minReplicas: 1
    maxReplicas: 5
    metrics:
      - type: schedule
        schedules:
          - cron: "0 22 25-31 * *"
            replicas: 4
  _default:
    minReplicas: 1
    maxReplicas: 5
    metrics:
      - type: cpu
        targetAverageUtilization: 70

fleetLimits:
  maxActiveAgents: 50
  maxAgentsPerDomain: 20
  maxShadowAgents: 10
  maxReplicasGlobalCeiling: 20

postgresql:
  enabled: false  # Use external Cloud SQL
redis:
  enabled: false  # Use Memorystore or in-cluster

secretName: agenticorg-secrets

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false

env:
  AGENTICORG_ENV: production
  AGENTICORG_LOG_LEVEL: INFO
  AGENTICORG_PII_MASKING: "true"
  AGENTICORG_DATA_REGION: IN
  AGENTICORG_MAX_CONCURRENT_WORKFLOWS: 500
  AGENTICORG_DEFAULT_CONFIDENCE_FLOOR: "0.88"
  AGENTICORG_LLM_PRIMARY: gemini-2.5-flash           # Switch to claude-sonnet-4-20250514 when needed
  AGENTICORG_LLM_FALLBACK: gemini-2.5-flash-preview-05-20     # Switch to gpt-4o-2024-11-20 when needed
  # Alembic is the schema authority. init_db() skips legacy DDL when this is true.
  AGENTICORG_DDL_MANAGED_BY_ALEMBIC: "true"
