# =============================================================================
# AgenticOrg — Production Nginx Configuration
# =============================================================================

# ── Hide nginx version ──────────────────────────────────────────────────────
server_tokens off;

# ── Gzip compression ─────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# ── Upstream backends ─────────────────────────────────────────────────────────
upstream api_backend {
    server agenticorg-api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Strip trailing slashes (fixes GSC "Alternative page with canonical") ─
    rewrite ^(.+)/$ $1 permanent;

    # ── Custom error pages — serve SPA instead of nginx default ──────────────
    error_page 502 503 504 /index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # SECURITY_AUDIT-2026-04-19 MEDIUM-13: dropped 'unsafe-eval' from
    # script-src — the SPA does not call eval() or new Function() and
    # SEC-2026-05-P2-009 (PR-G2, 2026-05-01): script-src no longer
    # carries 'unsafe-inline'. The seven 'sha256-...' tokens below
    # whitelist exactly the inline JSON-LD blocks in ui/index.html
    # (used for SEO structured data). Any edit to those blocks
    # requires regenerating the hash via:
    #   bash scripts/refresh_csp_hashes.sh
    # The corresponding regression test
    # tests/regression/test_security_pr_g2_csp_hash_pinning.py
    # fails if the source JSON-LD content drifts from the hashes here.
    # style-src retains 'unsafe-inline' (Tailwind utility class output
    # generates inline styles; documented residual, low-XSS-impact).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-silDIMUzIKrZq4B8I/NYBH4Ic7prd8raP5PJeutQckU=' 'sha256-wQU8MF/7cTNkXkniFP5d4yS1lI7m9vSxDrFND7S5GMM=' 'sha256-y9ZZesBGLi8D5oZ75ilyd3jjqKx5ttGPp6uuyshRixk=' 'sha256-aYTMCdCcFWDgMLWpudyh/kYDQNuAW0E2KOmFtnvp/ZQ=' 'sha256-R/Z95IwKFgil2Ms/1UNrSYrHZzBKm3FlxjAl+RYEDX8=' 'sha256-AxFnxwoAtckVibGP4rshZMGuWGlHTQpcply4CbMuii0=' 'sha256-0nBVhm4XYImcYyrpyw6KLo+p0RTLwEuMZeyUlsBLQdQ=' https://accounts.google.com https://apis.google.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://accounts.google.com; img-src 'self' data: blob: https://*.googleusercontent.com https://www.google-analytics.com; font-src 'self' data:; connect-src 'self' wss: ws: https://accounts.google.com https://oauth2.googleapis.com https://www.google-analytics.com https://analytics.google.com; frame-src https://accounts.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;

    # ── Static assets — long cache (hashed filenames from Vite/Webpack) ───────
    # If a chunk is missing (stale index.html references old build), serve
    # index.html so the SPA reloads with fresh chunk references.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri /index.html;
    }

    # ── Favicon, manifest, robots, sitemap — moderate cache ───────────────────
    # NOTE: Uses ^~ prefix to NOT match /api/ paths (those go to proxy below)
    location ~* ^/(?!api/|ws/).*\.(svg|ico|json|txt|xml)$ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── API proxy — ^~ prefix prevents regex from stealing /api/*.json ──────
    location ^~ /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;

        client_max_body_size 10m;
    }

    # ── WebSocket proxy ───────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── LLMs.txt for AI search engines ──────────────────────────────────────
    location = /llms.txt {
        add_header Content-Type text/plain;
        try_files /llms.txt =404;
    }
    location = /llms-full.txt {
        add_header Content-Type text/plain;
        try_files /llms-full.txt =404;
    }

    # ── Per-route SEO titles via sub_filter ──────────────────────────────────
    sub_filter_once on;
    sub_filter_types text/html;

    location = /pricing {
        sub_filter '<title>AgenticOrg' '<title>Pricing — AgenticOrg';
        sub_filter 'content="AI agents that reason AND act' 'content="AgenticOrg pricing: Free, Pro ($499/mo), Enterprise. 50+ AI agents';
        try_files /index.html =404;
    }

    location = /playground {
        sub_filter '<title>AgenticOrg' '<title>Agent Playground — Try AgenticOrg Live | AgenticOrg';
        sub_filter 'content="AI agents that reason AND act' 'content="Try 8 AI agents live — process invoices, screen resumes, classify tickets. No signup required. 50+ AI agents';
        try_files /index.html =404;
    }

    location = /evals {
        sub_filter '<title>AgenticOrg' '<title>Evaluation Matrix — 22 AI Agents Scored | AgenticOrg';
        sub_filter 'content="AI agents that reason AND act' 'content="Published evaluation scorecard: 50+ AI agents scored across quality, safety, performance, reliability, security, cost. 50+ AI agents';
        try_files /index.html =404;
    }

    location = /signup {
        sub_filter '<title>AgenticOrg' '<title>Create Account — AgenticOrg';
        sub_filter 'content="AI agents that reason AND act' 'content="Create your organization on AgenticOrg. 50+ AI agents';
        try_files /index.html =404;
    }

    location = /login {
        sub_filter '<title>AgenticOrg' '<title>Sign In — AgenticOrg';
        try_files /index.html =404;
    }

    # ── index.html — never cache (must always serve fresh for correct chunk refs) ──
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Explicit 404 page — returns real HTTP 404 for SEO ───────────────────
    location = /404 {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Robots-Tag "noindex, nofollow" always;
        return 404;
    }

    # ── SPA fallback — no cache on HTML ───────────────────────────────────────
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }
}
