# =============================================================================
# AgenticOrg — Production Nginx Configuration
# =============================================================================

# ── Hide nginx version ──────────────────────────────────────────────────────
server_tokens off;

# ── Gzip compression ─────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# ── Upstream backends ─────────────────────────────────────────────────────────
upstream api_backend {
    server agenticorg-api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://apis.google.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://accounts.google.com; img-src 'self' data: blob: https://*.googleusercontent.com https://www.google-analytics.com; font-src 'self' data:; connect-src 'self' wss: ws: https://accounts.google.com https://oauth2.googleapis.com https://www.google-analytics.com https://analytics.google.com; frame-src https://accounts.google.com; frame-ancestors 'none';" always;

    # ── Static assets — long cache (hashed filenames from Vite/Webpack) ───────
    # If a chunk is missing (stale index.html references old build), serve
    # index.html so the SPA reloads with fresh chunk references.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri /index.html;
    }

    # ── Favicon, manifest, robots, sitemap — moderate cache ───────────────────
    location ~* \.(svg|ico|json|txt|xml)$ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;

        client_max_body_size 10m;
    }

    # ── WebSocket proxy ───────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── LLMs.txt for AI search engines ──────────────────────────────────────
    location = /llms.txt {
        add_header Content-Type text/plain;
        try_files /llms.txt =404;
    }

    # ── Per-route SEO titles via sub_filter ──────────────────────────────────
    sub_filter_once on;
    sub_filter_types text/html;

    location = /pricing {
        sub_filter '<title>AgenticOrg' '<title>Pricing — AgenticOrg';
        sub_filter 'content="Deploy 24 AI agents' 'content="AgenticOrg pricing: Free, Pro ($499/mo), Enterprise. Deploy 24 AI agents';
        try_files /index.html =404;
    }

    location = /playground {
        sub_filter '<title>AgenticOrg' '<title>Agent Playground — Try AgenticOrg Live | AgenticOrg';
        sub_filter 'content="Deploy 24 AI agents' 'content="Try 8 AI agents live — process invoices, screen resumes, classify tickets. No signup required. Deploy 24 AI agents';
        try_files /index.html =404;
    }

    location = /evals {
        sub_filter '<title>AgenticOrg' '<title>Evaluation Matrix — 22 AI Agents Scored | AgenticOrg';
        sub_filter 'content="Deploy 24 AI agents' 'content="Published evaluation scorecard: 22 AI agents scored across quality, safety, performance, reliability, security, cost. Deploy 24 AI agents';
        try_files /index.html =404;
    }

    location = /signup {
        sub_filter '<title>AgenticOrg' '<title>Create Account — AgenticOrg';
        sub_filter 'content="Deploy 24 AI agents' 'content="Create your organization on AgenticOrg. Deploy 24 AI agents';
        try_files /index.html =404;
    }

    location = /login {
        sub_filter '<title>AgenticOrg' '<title>Sign In — AgenticOrg';
        try_files /index.html =404;
    }

    # ── index.html — never cache (must always serve fresh for correct chunk refs) ──
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── SPA fallback — no cache on HTML ───────────────────────────────────────
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }
}
