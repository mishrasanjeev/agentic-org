  <!-- JSON-LD: FAQPage -->

    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is AgenticOrg?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "AgenticOrg is an enterprise AI agent platform that deploys 24 pre-built AI agents across Finance, HR, Marketing, and Operations. Each agent automates domain-specific tasks like invoice processing, payroll, campaign management, and incident response — with human-in-the-loop governance ensuring humans approve every critical decision."
        }

      {
        "@type": "Question",
        "name": "How does Human-in-the-Loop (HITL) work?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "HITL governance ensures that critical decisions require human approval. For example, invoices above ₹5 lakhs, all tax filings, month-end close packages, and high-value HR offers are automatically escalated to the relevant department head (CFO, CHRO, CMO, or COO) for approval before the agent proceeds."
        }
      },
      {
        "@type": "Question",
        "name": "What enterprise systems does AgenticOrg connect to?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "AgenticOrg has 42 pre-built connectors including Oracle Fusion, SAP S/4HANA, Salesforce, Tally Prime, GSTN, Income Tax India, EPFO, Darwinbox, Stripe, Slack, Jira, HubSpot, and more. India-first connectors for GSTN, EPFO, and Income Tax are built-in."
        }
      },
      {
        "@type": "Question",
        "name": "Is AgenticOrg free?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "AgenticOrg is open-source under Apache 2.0 license. You can start free with the self-hosted version. Enterprise plans with managed hosting, SLA guarantees, and dedicated support are also available."
        }
      },
      {
        "@type": "Question",
        "name": "How long does it take to deploy AgenticOrg?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "You can deploy AgenticOrg in under 5 minutes using our Helm chart on any Kubernetes cluster. Agents start in shadow mode, allowing you to test them against your real data before promoting to production."
        }
      }
    ]
  }
