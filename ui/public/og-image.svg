<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="630" stroke="white" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="630" stroke="white" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="white" stroke-width="1"/>
    <line x1="560" y1="0" x2="560" y2="630" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="630" stroke="white" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="880" y1="0" x2="880" y2="630" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1040" y1="0" x2="1040" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0" y1="560" x2="1200" y2="560" stroke="white" stroke-width="1"/>
  </g>

  <!-- Glow effects -->
  <circle cx="300" cy="200" r="200" fill="#3b82f6" opacity="0.07"/>
  <circle cx="900" cy="400" r="250" fill="#a855f7" opacity="0.06"/>
  <circle cx="600" cy="300" r="150" fill="#10b981" opacity="0.04"/>

  <!-- Logo hexagon -->
  <g transform="translate(100, 200)">
    <polygon points="40,2 74,22 74,58 40,78 6,58 6,22" fill="url(#logo-grad)" rx="4"/>
    <text x="40" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="700" fill="white">A</text>
  </g>

  <!-- Brand name -->
  <text x="200" y="255" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="700" fill="white">AgenticOrg</text>

  <!-- Main headline -->
  <text x="100" y="355" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="white">24 AI Agents.</text>
  <text x="100" y="420" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#accent)">42 Enterprise Systems.</text>
  <text x="100" y="485" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="white">One Platform.</text>

  <!-- Subtext -->
  <text x="100" y="540" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#94a3b8">Open Source  ·  Apache 2.0  ·  India-First  ·  HITL Governance</text>

  <!-- Domain -->
  <text x="100" y="590" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#64748b">agenticorg.ai</text>

  <!-- Stats on right side -->
  <g transform="translate(780, 170)">
    <rect x="0" y="0" width="320" height="60" rx="12" fill="white" opacity="0.05"/>
    <text x="30" y="38" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#3b82f6">24</text>
    <text x="70" y="38" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">Agents</text>
    <text x="150" y="38" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#a855f7">42</text>
    <text x="190" y="38" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">Connectors</text>
  </g>

  <!-- Domain pills -->
  <g transform="translate(780, 260)">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="#10b981" opacity="0.15"/>
    <text x="65" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#10b981">Finance</text>

    <rect x="145" y="0" width="80" height="36" rx="18" fill="#3b82f6" opacity="0.15"/>
    <text x="185" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">HR</text>

    <rect x="240" y="0" width="130" height="36" rx="18" fill="#a855f7" opacity="0.15"/>
    <text x="305" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#a855f7">Marketing</text>
  </g>

  <g transform="translate(780, 310)">
    <rect x="0" y="0" width="80" height="36" rx="18" fill="#f97316" opacity="0.15"/>
    <text x="40" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f97316">Ops</text>

    <rect x="95" y="0" width="145" height="36" rx="18" fill="#06b6d4" opacity="0.15"/>
    <text x="167" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#06b6d4">Back Office</text>
  </g>

  <!-- India badge -->
  <g transform="translate(780, 380)">
    <rect x="0" y="0" width="320" height="50" rx="10" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08"/>
    <text x="20" y="32" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94a3b8">GSTN · EPFO · Darwinbox · Keka · MCA</text>
  </g>
</svg>
